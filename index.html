        // 全局变量
        let currentIndex = 0;
        let selected = false;
        const cardBox = document.getElementById("cardBox");
        const questionTitle = document.getElementById("questionTitle");
        const optionsBox = document.getElementById("optionsBox");
        const resultBox = document.getElementById("resultBox");
        const analysisBox = document.getElementById("analysisBox");
        const nextBtn = document.getElementById("nextBtn");
        const prevBtn = document.getElementById("prevBtn");
        const quickNav = document.getElementById("quickNav");

        // 渲染快速跳转导航（每10题一个链接）
        function renderQuickNav() {
            if (!questions || questions.length === 0) return;
            const total = questions.length;
            let html = '<span style="margin-right:8px;">快速跳转：</span>';
            for (let i = 10; i <= total; i += 10) {
                const isCurrent = (currentIndex + 1) === i;
                const style = isCurrent ? 'font-weight:bold;color:#333;' : '';
                html += '<a href="javascript:void(0)" onclick="jumpTo(' + (i-1) + ')">' + '第' + i + '题</a>';
            }
            quickNav.innerHTML = html;
        }

        // 跳转到指定题号
        function jumpTo(index) {
            if (index >= 0 && index < questions.length) {
                currentIndex = index;
                selected = false;
                loadQuestion(currentIndex);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // 页面加载完成后初始化
        window.onload = function() {
            // 容错处理：题库为空时提示
            if(!questions || questions.length === 0) {
                cardBox.innerHTML = '<div class="empty-tip">⚠️ 题库为空，请检查代码中的题目配置</div>';
                alert("错误：题库为空，请检查代码里的questions数组是否正确填写");
                return;
            }
            // 正常加载第一题
            loadQuestion(currentIndex);
        };

        // 加载题目核心函数
        function loadQuestion(index) {
            // 重置状态
            selected = false;
            const currentQuestion = questions[index];
            
            // 填充题干
            questionTitle.innerText = `第${index+1}题：${currentQuestion.title}`;
            // 清空选项区
            optionsBox.innerHTML = "";
            
            // 循环生成选项按钮
            currentQuestion.options.forEach((option) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = option;
                // 绑定点击判分事件
                btn.onclick = function() {
                    checkAnswer(option, btn, currentQuestion.answer, currentQuestion.analysis);
                };
                optionsBox.appendChild(btn);
            });

            // 重置结果和解析区
            resultBox.style.display = "none";
            analysisBox.style.display = "none";
            nextBtn.style.display = "none";
            prevBtn.style.display = (currentIndex === 0) ? "none" : "block";
            renderQuickNav();
        }

        // 判分+显示解析函数
        function checkAnswer(selectedOption, selectedBtn, correctAnswer, analysis) {
            // 防止重复点击
            if (selected) return;
            selected = true;

            // 禁用所有选项按钮
            const allBtns = document.querySelectorAll(".option-btn");
            allBtns.forEach(btn => btn.disabled = true);

            // 判断对错
            const isCorrect = selectedOption.trim().startsWith(correctAnswer.trim());
            
            // 高亮选项
            if (isCorrect) {
                selectedBtn.classList.add("correct");
                resultBox.className = "result-box result-correct";
                resultBox.innerText = `✅ 回答正确！正确答案：${correctAnswer}`;
            } else {
                selectedBtn.classList.add("wrong");
                resultBox.className = "result-box result-wrong";
                resultBox.innerText = `❌ 回答错误！正确答案：${correctAnswer}`;
                // 高亮正确选项
                allBtns.forEach(btn => {
                    if (btn.innerText.trim().startsWith(correctAnswer.trim())) {
                        btn.classList.add("correct");
                    }
                });
            }

            // 显示结果和解析
            resultBox.style.display = "block";
            analysisBox.innerHTML = analysis;
            analysisBox.style.display = "block";
            
            // 处理下一题/重新开始按钮
            if (currentIndex === questions.length - 1) {
                nextBtn.innerText = "重新开始刷题";
                nextBtn.classList.add("restart-btn");
                nextBtn.onclick = function() {
                    currentIndex = 0;
                    nextBtn.classList.remove("restart-btn");
                    nextBtn.innerText = "下一题";
                    prevBtn.style.display = "none";
                    loadQuestion(currentIndex);
                };
            } else {
                nextBtn.onclick = function() {
                    currentIndex++;
                    loadQuestion(currentIndex);
                };
            }
            prevBtn.onclick = function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    loadQuestion(currentIndex);
                }
            };
            prevBtn.style.display = (currentIndex === 0) ? "none" : "block";
            renderQuickNav();
            nextBtn.style.display = "block";
        }
    </script>
